# One command to run everything:  docker compose up --build
# API on http://localhost:4000  ·  admin at http://localhost:4000/admin
# Mongo data persists in the named volume `mongo_data`.
services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "4000:4000"
    environment:
      MONGODB_URI: mongodb://mongo:27017/critiflix
      PORT: "4000"
      NODE_ENV: development
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-access-secret-change-me-0123456789abcdef}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-change-me-fedcba9876543210}
      ACCESS_TOKEN_TTL: 15m
      REFRESH_TOKEN_TTL_DAYS: "30"
      BCRYPT_ROUNDS: "10"
      SEED_PASSWORD: critiflix123
      SEED_ON_START: "true"
      PAYSTACK_SECRET_KEY: ${PAYSTACK_SECRET_KEY:-}
      PAYSTACK_PUBLIC_KEY: ${PAYSTACK_PUBLIC_KEY:-}

volumes:
  mongo_data:
